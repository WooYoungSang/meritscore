<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MeritScore — On-chain credit scoring for AI agents</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0d1117;
    --card: #161b22;
    --card-2: #1c232c;
    --border: #222a35;
    --border-soft: #1b222c;
    --text: #e6edf3;
    --text-dim: #8b96a5;
    --text-mute: #5b6675;
    --accent: #00d4ff;
    --accent-dim: #0891a8;
    --green: #00c851;
    --red: #ff4444;
    --gray: #555d68;
    --orange: #ff9e3d;
    --purple: #b48dff;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    font-feature-settings: 'ss01' on, 'cv11' on;
  }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }

  body::before {
    content: "";
    position: fixed; inset: 0;
    background:
      radial-gradient(1000px 500px at 85% -10%, rgba(0,212,255,0.06), transparent 60%),
      radial-gradient(900px 500px at 10% 110%, rgba(180,141,255,0.05), transparent 60%),
      linear-gradient(transparent 0, transparent 39px, rgba(255,255,255,0.02) 40px),
      linear-gradient(90deg, transparent 0, transparent 39px, rgba(255,255,255,0.02) 40px);
    background-size: auto, auto, 40px 40px, 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  #root {
    position: relative;
    z-index: 1;
    max-width: 1400px;
    margin: 0 auto;
    padding: 28px 32px 40px;
  }

  .header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 24px;
    padding: 18px 22px;
    background: linear-gradient(180deg, rgba(22,27,34,0.9), rgba(22,27,34,0.6));
    border: 1px solid var(--border);
    border-radius: 14px;
    backdrop-filter: blur(6px);
  }
  .brand { display: flex; gap: 16px; align-items: center; }
  .brand-mark {
    width: 44px; height: 44px;
    border-radius: 10px;
    background: radial-gradient(circle at 30% 30%, rgba(0,212,255,0.9), rgba(0,212,255,0.1) 60%), #0b1218;
    border: 1px solid rgba(0,212,255,0.35);
    display: grid; place-items: center;
    box-shadow: 0 0 24px rgba(0,212,255,0.25) inset, 0 0 16px rgba(0,212,255,0.15);
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700; color: #001218; font-size: 18px;
  }
  .brand-text h1 {
    margin: 0;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700; letter-spacing: -0.02em; font-size: 26px; color: #fff;
  }
  .brand-text h1 span { color: var(--accent); }
  .brand-text p { margin: 4px 0 0; font-size: 13px; color: var(--text-dim); max-width: 620px; line-height: 1.45; }

  .pills { display: flex; gap: 10px; flex-shrink: 0; padding-top: 4px; }
  .chain-pill {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 12px; border-radius: 999px;
    background: rgba(0,200,81,0.08); border: 1px solid rgba(0,200,81,0.28);
    color: #b8f5c9; font-size: 12px;
    font-family: 'JetBrains Mono', monospace; font-weight: 500;
  }
  .chain-pill.offline {
    background: rgba(255,68,68,0.08); border-color: rgba(255,68,68,0.28); color: #ffc5c5;
  }
  .chain-pill .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green); box-shadow: 0 0 8px var(--green);
    animation: pulse 2s ease-in-out infinite;
  }
  .chain-pill.offline .dot { background: var(--red); box-shadow: 0 0 8px var(--red); animation: none; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.45; } }

  .section-head {
    display: flex; align-items: baseline; justify-content: space-between;
    margin: 28px 4px 14px;
  }
  .section-head .label {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    letter-spacing: 0.2em; color: var(--text-mute); text-transform: uppercase;
  }
  .section-head .meta { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-mute); }

  .agent-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .agent-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 20px 22px 22px;
    position: relative; overflow: hidden; cursor: pointer;
    transition: border-color 0.2s, transform 0.2s;
  }
  .agent-card:hover { border-color: #2d3744; transform: translateY(-1px); }
  .agent-card::before {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background: linear-gradient(180deg, transparent 60%, rgba(0,0,0,0.2));
  }
  .agent-card.selected {
    border-color: rgba(0,212,255,0.5);
    box-shadow: 0 0 0 1px rgba(0,212,255,0.2), 0 8px 30px rgba(0,212,255,0.08);
  }

  .card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; position: relative; }
  .agent-name { font-family: 'JetBrains Mono', monospace; font-weight: 600; font-size: 15px; color: #fff; letter-spacing: -0.01em; }
  .agent-role { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
  .avatar {
    width: 36px; height: 36px; border-radius: 10px; border: 1px solid var(--border);
    display: grid; place-items: center;
    font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 600; background: #0f141b;
  }
  .avatar.red { color: var(--red); border-color: rgba(255,68,68,0.3); }
  .avatar.green { color: var(--green); border-color: rgba(0,200,81,0.3); }
  .avatar.gray { color: var(--text-dim); }

  .score-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.2em; color: var(--text-mute); text-transform: uppercase; margin-bottom: 6px; }
  .score { font-family: 'JetBrains Mono', monospace; font-size: 56px; font-weight: 600; line-height: 1; letter-spacing: -0.04em; color: #fff; position: relative; }
  .score .suffix { font-size: 14px; color: var(--text-mute); font-weight: 500; margin-left: 8px; letter-spacing: 0; }

  .bar { margin-top: 18px; height: 6px; border-radius: 999px; background: #0a0f15; overflow: hidden; }
  .bar .fill { height: 100%; border-radius: 999px; transition: width 0.9s cubic-bezier(0.2,0.8,0.2,1); }
  .bar.red .fill { background: linear-gradient(90deg, #c92a2a, var(--red)); box-shadow: 0 0 12px rgba(255,68,68,0.4); }
  .bar.green .fill { background: linear-gradient(90deg, #0aa045, var(--green)); box-shadow: 0 0 12px rgba(0,200,81,0.35); }
  .bar.gray .fill { background: #2a313b; }

  .bar-meta { margin-top: 8px; display: flex; justify-content: space-between; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-mute); letter-spacing: 0.05em; }

  .verdict-row { display: flex; align-items: center; gap: 8px; margin-top: 18px; flex-wrap: wrap; }
  .verdict {
    display: inline-flex; align-items: center; gap: 7px; padding: 6px 12px;
    border-radius: 999px; font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
  }
  .verdict .d { width: 7px; height: 7px; border-radius: 50%; }
  .verdict.approved { color: #b8f5c9; background: rgba(0,200,81,0.12); border: 1px solid rgba(0,200,81,0.4); box-shadow: 0 0 16px rgba(0,200,81,0.2); }
  .verdict.approved .d { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .verdict.rejected { color: #ffc5c5; background: rgba(255,68,68,0.1); border: 1px solid rgba(255,68,68,0.4); box-shadow: 0 0 16px rgba(255,68,68,0.18); }
  .verdict.rejected .d { background: var(--red); box-shadow: 0 0 8px var(--red); }
  .verdict.blocked { color: #a7b0bc; background: rgba(85,93,104,0.15); border: 1px solid rgba(85,93,104,0.45); }
  .verdict.blocked .d { background: var(--gray); }

  .mode-pill { font-family: 'JetBrains Mono', monospace; font-size: 10px; padding: 5px 10px; border-radius: 999px; border: 1px solid var(--border); color: var(--text-dim); letter-spacing: 0.06em; }
  .mode-pill.direct { color: var(--text-dim); }
  .mode-pill.workflow { color: var(--orange); border-color: rgba(255,158,61,0.3); background: rgba(255,158,61,0.06); }
  .mode-pill.web3 { color: var(--purple); border-color: rgba(180,141,255,0.3); background: rgba(180,141,255,0.06); }

  .spark { margin-top: 16px; height: 36px; width: 100%; display: block; }

  .tabs-wrap { margin-top: 28px; background: var(--card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
  .tabs-bar { display: flex; border-bottom: 1px solid var(--border); background: #10161e; }
  .tab-btn {
    flex: 1; padding: 14px 18px; background: transparent; border: 0;
    color: var(--text-dim); font-family: 'Space Grotesk', sans-serif;
    font-size: 13px; font-weight: 500; letter-spacing: 0.02em; cursor: pointer;
    display: flex; align-items: center; gap: 10px; justify-content: center;
    position: relative; transition: color 0.15s, background 0.15s;
  }
  .tab-btn:hover { color: #d0d8e4; }
  .tab-btn.active { color: #fff; background: rgba(0,212,255,0.04); }
  .tab-btn.active::after {
    content: ""; position: absolute; left: 18px; right: 18px; bottom: -1px;
    height: 2px; background: var(--accent); box-shadow: 0 0 8px var(--accent);
  }
  .tab-btn .sword { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-mute); background: rgba(255,255,255,0.04); padding: 2px 6px; border-radius: 4px; letter-spacing: 0.08em; }
  .tab-btn.active .sword { color: var(--accent); background: rgba(0,212,255,0.1); }
  .tab-body { padding: 24px 26px 28px; }

  .hash-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .hash-box { background: #0b1117; border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; position: relative; }
  .hash-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.15em; color: var(--text-mute); text-transform: uppercase; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
  .hash-label .ok { color: var(--green); font-size: 10px; letter-spacing: 0; }
  .hash-value { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: #d5deea; word-break: break-all; line-height: 1.4; }
  .hash-value .prefix { color: var(--accent); }
  .copy-btn { position: absolute; top: 12px; right: 12px; background: transparent; border: 1px solid var(--border); color: var(--text-mute); font-family: 'JetBrains Mono', monospace; font-size: 10px; padding: 3px 8px; border-radius: 5px; cursor: pointer; transition: all 0.15s; }
  .copy-btn:hover { color: var(--accent); border-color: rgba(0,212,255,0.4); }

  .tee-footer { margin-top: 18px; display: flex; align-items: center; justify-content: space-between; gap: 12px; padding-top: 16px; border-top: 1px dashed var(--border); }
  .tee-caption { font-size: 12px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; }
  .tee-caption .em { color: #d5deea; }
  .badge { font-family: 'JetBrains Mono', monospace; font-size: 10px; padding: 5px 10px; border-radius: 999px; letter-spacing: 0.08em; }
  .badge.workflow { background: rgba(255,158,61,0.1); color: var(--orange); border: 1px solid rgba(255,158,61,0.3); }

  .wf-grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 20px; }
  .wf-field-row { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
  .wf-field-row label { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.15em; color: var(--text-mute); text-transform: uppercase; }
  .wf-field-row input[type="text"] { background: #0b1117; border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; color: #fff; font-family: 'JetBrains Mono', monospace; font-size: 13px; outline: none; transition: border-color 0.15s, box-shadow 0.15s; }
  .wf-field-row input[type="text"]:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,212,255,0.12); }

  .slider-row { display: flex; align-items: center; gap: 14px; }
  .slider-row input[type="range"] { flex: 1; -webkit-appearance: none; appearance: none; height: 4px; background: linear-gradient(90deg, var(--accent) 0%, var(--accent) var(--pct, 50%), #1f2630 var(--pct, 50%)); border-radius: 999px; outline: none; }
  .slider-row input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 16px; height: 16px; background: #fff; border-radius: 50%; border: 3px solid var(--accent); cursor: pointer; box-shadow: 0 0 10px rgba(0,212,255,0.5); }
  .slider-val { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: #fff; background: #0b1117; border: 1px solid var(--border); padding: 6px 10px; border-radius: 6px; min-width: 72px; text-align: center; }

  .run-btn { margin-top: 18px; width: 100%; background: linear-gradient(180deg, #00d4ff 0%, #00a8cc 100%); color: #001a22; font-family: 'JetBrains Mono', monospace; font-weight: 700; letter-spacing: 0.1em; font-size: 12px; padding: 13px 16px; border: 0; border-radius: 8px; cursor: pointer; box-shadow: 0 0 0 1px rgba(0,212,255,0.4), 0 8px 24px rgba(0,212,255,0.2); transition: transform 0.15s, box-shadow 0.15s; }
  .run-btn:hover { transform: translateY(-1px); box-shadow: 0 0 0 1px rgba(0,212,255,0.6), 0 10px 30px rgba(0,212,255,0.3); }
  .run-btn:active { transform: translateY(0); }
  .run-btn:disabled { opacity: 0.6; cursor: not-allowed; }

  .steps { background: #0b1117; border: 1px solid var(--border); border-radius: 10px; padding: 18px; height: 100%; display: flex; flex-direction: column; }
  .steps-title { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.15em; color: var(--text-mute); text-transform: uppercase; margin-bottom: 14px; display: flex; justify-content: space-between; }
  .step-row { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
  .step { flex: 1; border: 1px solid var(--border); border-radius: 8px; padding: 12px 10px; text-align: center; background: #10161e; transition: all 0.25s; }
  .step .step-name { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.12em; color: var(--text-dim); }
  .step .step-icon { font-size: 18px; margin-top: 4px; height: 22px; display: flex; align-items: center; justify-content: center; }
  .step.active { border-color: var(--accent); background: rgba(0,212,255,0.08); box-shadow: 0 0 16px rgba(0,212,255,0.15); }
  .step.active .step-name { color: var(--accent); }
  .step.done { border-color: rgba(0,200,81,0.4); background: rgba(0,200,81,0.06); }
  .step.done .step-name { color: #b8f5c9; }
  .step.fail { border-color: rgba(255,68,68,0.4); background: rgba(255,68,68,0.06); }
  .step.fail .step-name { color: #ffc5c5; }
  .arrow { color: var(--text-mute); font-family: 'JetBrains Mono', monospace; flex-shrink: 0; }

  .log { margin-top: 14px; background: #070b0f; border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #9aa7b8; min-height: 70px; max-height: 120px; overflow-y: auto; line-height: 1.6; }
  .log .ts { color: var(--text-mute); }
  .log .ok { color: var(--green); }
  .log .warn { color: var(--orange); }
  .log .err { color: var(--red); }
  .log .info { color: var(--accent); }

  .wf-caption { margin-top: 14px; font-size: 12px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; display: flex; align-items: center; gap: 8px; }

  .footer { margin-top: 24px; display: flex; justify-content: space-between; align-items: center; padding: 14px 18px; border-top: 1px solid var(--border); font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-mute); flex-wrap: wrap; gap: 12px; }
  .legend { display: flex; gap: 14px; align-items: center; }
  .legend .item { display: inline-flex; align-items: center; gap: 6px; }
  .legend .dot { width: 8px; height: 8px; border-radius: 50%; }
  .legend .direct { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
  .legend .workflow { background: var(--orange); box-shadow: 0 0 6px var(--orange); }
  .legend .web3 { background: var(--purple); box-shadow: 0 0 6px var(--purple); }

  @media (max-width: 960px) {
    .agent-grid { grid-template-columns: 1fr; }
    .hash-grid { grid-template-columns: 1fr; }
    .wf-grid { grid-template-columns: 1fr; }
    .header { flex-direction: column; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<script type="text/babel" src="/ui/app.jsx"></script>
</body>
</html>
